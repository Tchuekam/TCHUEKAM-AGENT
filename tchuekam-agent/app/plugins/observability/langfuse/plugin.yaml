name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for TchuEkaM — traces conversations, LLM calls, and tool usage. Opt-in via `tchuekam plugins enable observability/langfuse` (or check the box in `tchuekam plugins`)."
author: NousResearch
requires_env:
  - TCHUEKAM_LANGFUSE_PUBLIC_KEY
  - TCHUEKAM_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
