name: Security Audit & Supply-Chain Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Monday

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit bandit safety

    - name: Run Pip-Audit (Dependency Vulnerabilities)
      run: |
        # Only audit dependencies we install directly if requirements.txt exists
        if [ -f "requirements.txt" ]; then pip-audit -r requirements.txt; fi

    - name: Run Bandit (Static Analysis)
      run: |
        bandit -r tchuekam-agent/app/ -ll -i

    - name: Verify Checksums (Supply-Chain)
      run: |
        python scripts/verify_checksums.py
